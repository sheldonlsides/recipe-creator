# PostgreSQL 17 + pgvector for the nutrition vector store (local dev, Docker Desktop).
# Only the DATABASE runs in a container; the notebook runs on the host and connects
# at localhost:5432. Tuned for ~327K 384-dim vectors (all-MiniLM-L6-v2) — a quarter
# the size of the 1536-dim examples in docs/pgvector-setup.md.
#
#   docker compose -f deploy/docker-compose.yml up -d
#
services:
  db:
    image: pgvector/pgvector:pg17        # pgvector 0.8.2 as of June 2026
    container_name: recipe-pgvector
    restart: unless-stopped
    shm_size: '512mb'                    # default 64MB is too small for HNSW builds
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: appdb
    ports:
      # Host 5433 (not 5432) to avoid colliding with a host-native Postgres that may
      # already own 5432. The notebook connects to localhost:5433; inside the container
      # Postgres still listens on 5432. Bound to 127.0.0.1 so the port is reachable
      # only from this machine, not from other hosts on the network.
      - "127.0.0.1:5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro   # runs once, on first boot only
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"           # ~25% of an 8GB Docker allocation
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "max_wal_size=4GB"               # fewer checkpoints during the bulk load
      - "-c"
      - "checkpoint_timeout=15min"
      - "-c"
      - "max_parallel_maintenance_workers=4"   # parallelize the HNSW index build
      - "-c"
      - "max_parallel_workers=4"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgvector_data:
    name: recipe_pgvector_data           # survives `down`; removed only by `down -v`
